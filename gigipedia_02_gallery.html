<style>

:root{
    --primary-color:#1C5B79;
    --secondary-color:#9ECC64;
    --gradient-main:linear-gradient(
        135deg,
        #1C5B79 0%,
        #4C9B6A 50%,
        #9ECC64 100%
    );
}

body{
    background:#f8fafb;
}

html{
    scroll-behavior:smooth;
}

/* Navbar */
.navbar{
    background:var(--gradient-main)!important;
}

.navbar-logo {
    width: 45px;
    height: 45px;
    object-fit: contain; /* atau cover jika ingin memenuhi ukuran */
    margin-right: 10px;
}

/* Judul */
.section-title{
    color:var(--primary-color);
    font-weight:bold;
}

.title-line{
    width:120px;
    height:4px;
    background:var(--gradient-main);
    margin:15px auto 40px;
    border-radius:20px;
}

/* Awal Pake Background */
body{
    position: relative;
    z-index: 0;
}

/* Background gambar full halaman */
body::before{
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url("File GigiPedia/RSCB Bersih.png") no-repeat center center;
    background-size: cover;

    /* Hitam putih + redup */
    filter: grayscale(100%);
    opacity: 0.4;   

    z-index: -1;
}
/* Akhir Pake Background */

/* Galeri */

.Galeri-item{
    overflow:hidden;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    transition:.3s;
}

.Galeri-item:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 30px rgba(0,0,0,.2);
}

.Galeri-item img{
    width:100%;
    height:250px;
    object-fit:cover;
    transition:.4s;
}

.Galeri-item:hover img{
    transform:scale(1.08);
}

/* Footer */

footer{
    background: var(--gradient-main);
    color: white;
    height: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
}

footer p{
    margin: 0;
}

.modal-content{
    background:transparent;
    border:none;
}

.modal-body img{
    width:100%;
    max-height:90vh;
    object-fit:contain;
}

.btn-close{
    background:white;
}

</style>

</head>
